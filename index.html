<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord CRM · Digital</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="app">
        <!-- HEADER -->
        <header class="header">
            <div class="header-left">
                <div class="logo-mark">◆</div>
                <div>
                    <h1>DSCRM</h1>
                    <span class="version">v2.0 · digital</span>
                </div>
            </div>
            <div class="header-right">
                <div class="stat-item">
                    <span class="stat-value" id="userCount">0</span>
                    <span class="stat-label">users</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="warnCount">0</span>
                    <span class="stat-label">warns</span>
                </div>
            </div>
        </header>

        <!-- MAIN -->
        <main>
            <!-- Add User -->
            <section class="panel panel-add">
                <h2>new user</h2>
                <div class="form-group">
                    <input type="text" id="userName" placeholder="username" class="input">
                    <input type="text" id="userTag" placeholder="discord tag" class="input">
                    <select id="userRole" class="input"></select>
                    <button onclick="addUser()" class="btn primary">+ add</button>
                </div>
            </section>

            <!-- Add Role -->
            <section class="panel panel-role">
                <h2>roles</h2>
                <div class="form-group">
                    <input type="text" id="newRoleName" placeholder="new role name" class="input">
                    <button onclick="addRole()" class="btn secondary">create</button>
                </div>
            </section>

            <!-- Table -->
            <section class="panel panel-table">
                <div class="table-header">
                    <h2>members</h2>
                    <span class="badge" id="userBadge">0 active</span>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>user</th>
                                <th>discord</th>
                                <th>role</th>
                                <th>warnings</th>
                                <th>actions</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>

        <!-- FOOTER -->
        <footer class="footer">
            <span>DSCRM · 2026</span>
            <span>digital interface</span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
