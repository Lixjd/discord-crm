<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 Discord CRM</h1>
        
        <!-- Блок добавления пользователя -->
        <div class="add-user">
            <h2>➕ Добавить участника</h2>
            <input type="text" id="userName" placeholder="Имя">
            <input type="text" id="userTag" placeholder="Discord Tag (name#1234)">
            <select id="userRole">
                <!-- Сюда будут подгружаться роли из JSON -->
            </select>
            <button onclick="addUser()">Добавить</button>
        </div>

        <!-- Блок добавления роли -->
        <div class="add-role">
            <h2>⚙️ Добавить новую роль</h2>
            <input type="text" id="newRoleName" placeholder="Название роли">
            <button onclick="addRole()">Создать роль</button>
        </div>

        <!-- Таблица пользователей -->
        <h2>👥 Список участников</h2>
        <table id="userTable">
            <thead>
                <tr>
                    <th>Имя</th>
                    <th>Discord Tag</th>
                    <th>Роль</th>
                    <th>Выговоры</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <!-- Сюда JS будет вставлять строки -->
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
